<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Fast Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body { text-align:center; font-family:Arial; direction:rtl; }
video { width:320px; border:2px solid #333; }
#total { font-size:26px; color:green; margin-top:20px; }
</style>
</head>

<body>

<h2>⚡ قراءة سريعة (Net)</h2>

<button onclick="startCamera()">تشغيل</button>

<br>
<video id="video" autoplay playsinline></video>

<div id="total">المجموع: 0</div>

<audio id="beep">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>
let total = 0;
let lastValue = null;

async function startCamera(){
const stream = await navigator.mediaDevices.getUserMedia({
video: { facingMode: "environment" }
});
document.getElementById("video").srcObject = stream;

fastScan();
}

function fastScan(){
const video = document.getElementById("video");

setInterval(() => {

if(video.readyState !== 4) return;

// ⚡ Canvas صغير (تسريع)
const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

// نقص فقط الجزء السفلي (مكان Net تقريبا)
canvas.width = 200;
canvas.height = 100;

ctx.drawImage(video,
0, video.videoHeight * 0.6, // قص من الأسفل
video.videoWidth, video.videoHeight * 0.4,
0, 0, 200, 100);

// ⚡ قراءة سريعة
Tesseract.recognize(canvas, 'eng', {
tessedit_char_whitelist: '0123456789Net'
})
.then(({data:{text}})=>{

let match = text.match(/Net[:\s]*([\d]+)/i);

if(match){
let value = parseInt(match[1]);

if(value !== lastValue){
lastValue = value;
total += value;

document.getElementById("total").innerText = "المجموع: " + total;

// 🔊 صوت
document.getElementById("beep").play();
}
}

});

}, 700); // ⚡ أسرع (0.7 ثانية)

}
</script>

</body>
</html>
