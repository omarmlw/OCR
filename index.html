<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>قارئ التذاكر (Net)</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body {
    text-align: center;
    font-family: Arial;
    direction: rtl;
    background: #f5f5f5;
}
video {
    width: 320px;
    border: 2px solid #333;
    border-radius: 10px;
    margin-top: 10px;
}
button {
    padding: 12px 20px;
    margin: 8px;
    font-size: 18px;
    cursor: pointer;
    border: none;
    border-radius: 8px;
    background: #007bff;
    color: white;
}
button:hover {
    background: #0056b3;
}
#status {
    margin-top: 10px;
    font-weight: bold;
}
#result {
    margin-top: 10px;
    white-space: pre-wrap;
    background: #fff;
    padding: 10px;
    border-radius: 8px;
}
#total {
    font-size: 26px;
    color: green;
    margin-top: 20px;
}
</style>
</head>

<body>

<h2>📷 قراءة التذاكر (Net)</h2>

<button onclick="startCamera()">تشغيل الكاميرا الخلفية</button>
<button onclick="capture()">📸 التقاط</button>

<br>
<video id="video" autoplay playsinline></video>

<div id="status"></div>
<div id="result"></div>
<div id="total">المجموع: 0</div>

<script>
let total = 0;
let stream = null;

// تشغيل الكاميرا الخلفية
async function startCamera() {
    document.getElementById("status").innerText = "🔄 جاري تشغيل الكاميرا...";

    try {
        const devices = await navigator.mediaDevices.enumerateDevices();

        let backCamera = devices.find(d =>
            d.kind === "videoinput" &&
            d.label.toLowerCase().includes("back")
        );

        if (!backCamera) {
            backCamera = devices.find(d => d.kind === "videoinput");
        }

        stream = await navigator.mediaDevices.getUserMedia({
            video: {
                deviceId: backCamera ? backCamera.deviceId : undefined,
                facingMode: "environment"
            }
        });

        document.getElementById("video").srcObject = stream;
        document.getElementById("status").innerText = "✅ الكاميرا تعمل";

    } catch (err) {
        document.getElementById("status").innerText = "❌ فشل تشغيل الكاميرا";
        alert("افتح الصفحة عبر https أو localhost واسمح بالكاميرا");
        console.error(err);
    }
}

// التقاط الصورة وتحليلها
function capture() {
    if (!stream) {
        alert("شغل الكاميرا أولا");
        return;
    }

    document.getElementById("status").innerText = "📸 يتم التقاط الصورة...";

    const video = document.getElementById("video");
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    document.getElementById("status").innerText = "🤖 جاري تحليل التذكرة...";

    Tesseract.recognize(canvas, 'eng')
    .then(({ data: { text } }) => {

        document.getElementById("result").innerText = text;

        // استخراج Net فقط
        let match = text.match(/Net[:\s]*([\d]+)/i);

        if (match) {
            let value = parseInt(match[1]);
            total += value;

            document.getElementById("total").innerText = "المجموع: " + total;
        } else {
            alert("⚠️ لم يتم العثور على Net");
        }

        document.getElementById("status").innerText = "✅ تم بنجاح";

    })
    .catch(err => {
        document.getElementById("status").innerText = "❌ خطأ في التحليل";
        console.error(err);
    });
}
</script>

</body>
</html>
