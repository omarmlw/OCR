<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>قراءة التذاكر الذكية</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body { text-align:center; font-family:Arial; direction:rtl; }
video { width:300px; }
button { padding:10px; margin:10px; font-size:18px; }
#total { font-size:24px; color:green; }
</style>
</head>

<body>

<h2>📷 قراءة Net من التذاكر</h2>

<button onclick="startCamera()">تشغيل الكاميرا</button>
<button onclick="capture()">التقاط</button>

<br>
<video id="video" autoplay></video>

<div id="result"></div>
<div id="total">المجموع: 0</div>

<script>
let total = 0;

function startCamera(){
navigator.mediaDevices.getUserMedia({ video:true })
.then(stream=>{
document.getElementById("video").srcObject = stream;
});
}

function capture(){
const video = document.getElementById("video");
const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

canvas.width = video.videoWidth;
canvas.height = video.videoHeight;
ctx.drawImage(video,0,0);

Tesseract.recognize(canvas,'eng').then(({data:{text}})=>{

document.getElementById("result").innerText = text;

// 🔍 استخراج Net فقط
let match = text.match(/Net[:\s]*([\d]+)/i);

if(match){
let value = parseInt(match[1]);
total += value;

document.getElementById("total").innerText = "المجموع: " + total;
}else{
alert("لم يتم العثور على Net");
}

});
}
</script>

</body>
</html>
