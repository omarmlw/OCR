<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Ultra Fast Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body { text-align:center; font-family:Arial; direction:rtl; }
video { width:320px; border:2px solid #333; border-radius:10px; }
#box {
    position: absolute;
    border: 3px solid red;
    width: 200px;
    height: 80px;
    top: 150px;
    left: 50%;
    transform: translateX(-50%);
}
#total { font-size:26px; color:green; margin-top:20px; }
</style>
</head>

<body>

<h2>⚡ قارئ سريع جدا (Net)</h2>

<button onclick="startCamera()">تشغيل</button>

<br>
<div style="position:relative; display:inline-block;">
    <video id="video" autoplay playsinline></video>
    <div id="box"></div>
</div>

<div id="total">المجموع: 0</div>

<audio id="beep">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>
let total = 0;
let lastValue = null;

async function startCamera(){
const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
});

document.getElementById("video").srcObject = stream;

startScan();
}

function startScan(){
setInterval(scan, 600); // ⚡ أسرع
}

function scan(){
const video = document.getElementById("video");

if(video.readyState !== 4) return;

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

// 🎯 قص فقط المنطقة الوسطى (مكان Net)
const w = video.videoWidth;
const h = video.videoHeight;

const cropW = w * 0.6;
const cropH = h * 0.2;

const x = (w - cropW)/2;
const y = (h - cropH)/2;

canvas.width = cropW;
canvas.height = cropH;

ctx.drawImage(video, x, y, cropW, cropH, 0, 0, cropW, cropH);

Tesseract.recognize(canvas, 'eng', {
    tessedit_char_whitelist: '0123456789Net'
})
.then(({data:{text}})=>{

let match = text.match(/Net[:\s]*([\d]+)/i);

if(match){
let value = parseInt(match[1]);

if(value !== lastValue){
    lastValue = value;
    total += value;

    document.getElementById("total").innerText = "المجموع: " + total;

    document.getElementById("beep").play();
}
}

}).catch(()=>{});
}
</script>

</body>
</html>
